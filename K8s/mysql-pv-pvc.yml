apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv

spec:
  capacity:
    storage: 2Gi

  accessModes:
    - ReadWriteOnce

  persistentVolumeReclaimPolicy: Retain

  hostPath:
    path: /data/mysql

---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mysql-pvc
  namespace: clickncart

spec:
  accessModes:
    - ReadWriteOnce

  resources:
    requests:
      storage: 2Gi